<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Someone Special ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Deeper, more modern romantic gradient */
            background: linear-gradient(-45deg, #ff1744, #f50057, #d500f9, #651fff);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            font-family: 'Poppins', sans-serif;
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* High-Density Rain Particles */
        .particle {
            position: fixed;
            top: -50px;
            pointer-events: none;
            z-index: 1;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* Modern Typography */
        .top-text {
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 2s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Modern Floating Gift */
        .gift-container {
            position: relative;
            font-size: 110px;
            z-index: 10;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.8));
            animation: float 2.5s ease-in-out infinite;
            cursor: pointer;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-25px) scale(1.1); }
        }

        /* Glassmorphism Pulse Button */
        .open-btn {
            margin-top: 40px;
            padding: 20px 60px;
            font-size: 1.2rem;
            font-weight: 800;
            color: white;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 100px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            z-index: 10;
            letter-spacing: 2px;
            transition: 0.3s;
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(255, 255, 255, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
        }

        /* Full Screen Flash */
        #flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000;
            opacity: 0; pointer-events: none;
        }

        .flash-active { animation: flashAnim 1s forwards; }
        @keyframes flashAnim { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="flash"></div>

    <p class="top-text">For Someone Very Special ❤️</p>

    <div class="gift-container" id="giftBox">🎁</div>

    <button class="open-btn" onclick="handleOpen()">TAP TO OPEN</button>

    <audio id="bgMusic" src="bg.mp3" loop></audio>

    <script>
        // High-Density Rain (Hearts, Kisses, Sparkles)
        const particles = ['❤️', '💋', '✨', '💖', '🌸'];
        function createRain() {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = particles[Math.floor(Math.random() * particles.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = (Math.random() * 20 + 15) + 'px';
            
            const duration = Math.random() * 2 + 3; // 3-5 seconds
            p.style.animationDuration = duration + 's';
            p.style.opacity = Math.random();
            
            document.body.appendChild(p);
            setTimeout(() => p.remove(), duration * 1000);
        }

        // Flood effect: Create a drop every 80ms
        setInterval(createRain, 80);

        function handleOpen() {
            const audio = document.getElementById('bgMusic');
            const gift = document.getElementById('giftBox');
            const flash = document.getElementById('flash');

            audio.play().then(() => {
                localStorage.setItem('musicPlaying', 'true');
            }).catch(e => console.log("Music blocked"));

            // Box Opening Animation
            gift.style.transition = '1s';
            gift.style.transform = 'scale(5) rotate(20deg)';
            gift.style.opacity = '0';

            setTimeout(() => {
                flash.classList.add('flash-active');
            }, 300);

            setTimeout(() => {
                localStorage.setItem('musicTimestamp', audio.currentTime);
                window.location.href = 'wish.html';
            }, 1000);
        }

        // Sync Music Time
        setInterval(() => {
            const audio = document.getElementById('bgMusic');
            if (!audio.paused) {
                localStorage.setItem('musicTimestamp', audio.currentTime);
            }
        }, 1000);
    </script>
</body>
</html>
)
