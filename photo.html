<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Memory Lane ❤️</title>
    <style>
        /* Modern & Simple Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Outfit:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            width: 100vw;
        }

        body {
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            font-family: 'Poppins', sans-serif; /* Simplified Font */
            color: #1a1a1a;
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: rainMove linear infinite;
        }

        @keyframes rainMove {
            0% { transform: translateY(-10vh) translateX(0); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(110vh) translateX(30px); opacity: 0; }
        }

        .story-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            scroll-behavior: smooth;
            position: relative;
            z-index: 10;
        }

        .story-container::-webkit-scrollbar {
            display: none;
        }

        .screen {
            flex-shrink: 0;
            width: 100vw;
            height: 100vh;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            gap: 20px;
            opacity: 0.3;
            transition: opacity 0.8s;
        }

        .screen.active {
            opacity: 1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            border-radius: 35px;
            width: 90%;
            max-width: 380px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
        }

        .photo-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 28px;
            overflow: hidden;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Simple & Attractive Text Style */
        .romantic-text {
            font-size: 1.2rem;
            color: #000;
            padding: 15px 20px;
            line-height: 1.6;
            font-weight: 600; /* Medium bold for impact */
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s;
        }

        .screen.active .romantic-text {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-container {
            margin-top: auto;
            margin-bottom: 35px;
            position: relative;
            z-index: 100;
        }

        .nav-btn {
            background: #000;
            color: #fff;
            text-decoration: none;
            padding: 16px 85px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .nav-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="story-container" id="storyContainer">
        
        <section class="screen active" id="screen1">
            <div class="glass-card">
                <div class="photo-container"><img src="part1.png"></div>
            </div>
            <p class="romantic-text">last ramri xes yl tw 😘</p>
            <div class="btn-container">
                <button class="nav-btn" onclick="scrollToNext(1)">NEXT ❤️</button>
            </div>
        </section>

        <section class="screen" id="screen2">
            <div class="glass-card">
                <div class="photo-container"><img src="part2.png"></div>
            </div>
            <p class="romantic-text">yo photo harxu rw sadai haso lagx 😅</p>
            <div class="btn-container">
                <button class="nav-btn" onclick="scrollToNext(2)">NEXT ❤️</button>
            </div>
        </section>

        <section class="screen" id="screen3">
            <div class="glass-card">
                <div class="photo-container"><img src="part3.png"></div>
            </div>
            <p class="romantic-text">yo photo tha xa kaila ko ho.... Tw mama ghr gatis tw birami vatis maila khoi harxu talai vnyrw pathako ni 😅</p>
            <div class="btn-container">
                <button class="nav-btn" onclick="scrollToNext(3)">NEXT ❤️</button>
            </div>
        </section>

        <section class="screen" id="screen4">
            <div class="glass-card">
                <div class="photo-container"><img src="part4.png"></div>
            </div>
            <p class="romantic-text">all time video call gartim ni 😅❤️</p>
            <div class="btn-container">
                <button class="nav-btn" onclick="scrollToNext(4)">NEXT ❤️</button>
            </div>
        </section>

        <section class="screen" id="screen5">
            <div class="glass-card">
                <div class="photo-container"><img src="part5.png"></div>
            </div>
            <p class="romantic-text">tara j vayani last maya garxu yl talai 😘🥰</p>
            <div class="btn-container">
                <a href="rain.html" class="nav-btn">FINISH ❤️</a>
            </div>
        </section>

    </div>

    <script>
        function scrollToNext(current) {
            const container = document.getElementById('storyContainer');
            container.scrollTo({ left: window.innerWidth * current, behavior: 'smooth' });
        }

        const screens = document.querySelectorAll('.screen');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
                else entry.target.classList.remove('active');
            });
        }, { root: document.getElementById('storyContainer'), threshold: 0.6 });

        screens.forEach(s => observer.observe(s));

        const colors = ['#ffffff', '#ffeb3b', '#fffde7', '#fbc02d', '#ffd700'];
        function createRain() {
            const p = document.createElement('div');
            p.className = 'particle';
            const color = colors[Math.floor(Math.random() * colors.length)];
            const size = Math.random() * 5 + 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.backgroundColor = color;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = '-5vh';
            p.style.boxShadow = `0 0 ${size * 2}px ${color}`;
            p.style.animationDuration = (Math.random() * 3 + 4) + 's';
            p.style.zIndex = Math.random() > 0.6 ? "1" : "15";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 7000);
        }
        setInterval(createRain, 120);
    </script>
</body>
</html>
